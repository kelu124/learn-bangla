    // Fisher-Yates shuffle
    const sentences = [..._raw];
    for (let i = sentences.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [sentences[i], sentences[j]] = [sentences[j], sentences[i]];
    }
    const PER_PAGE = 3;
    let page = 0;
    const totalPages = Math.ceil(sentences.length / PER_PAGE);

    function render() {
      const start = page * PER_PAGE;
      const slice = sentences.slice(start, start + PER_PAGE);
      const container = document.getElementById('cards');
      container.innerHTML = '';
      slice.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.state = '0';
        card.innerHTML = `
          <div class="bengali">${s.bengali}</div>
          <div class="phonetic">${s.phonetic}</div>
          <div class="translation">${s.french}</div>
          <div class="hint">tap to reveal</div>
        `;
        card.addEventListener('click', () => {
          const st = parseInt(card.dataset.state);
          if (st === 0) {
            card.dataset.state = '1';
            card.classList.add('revealed-1');
            card.querySelector('.hint').textContent = 'tap for translation';
          } else if (st === 1) {
            card.dataset.state = '2';
            card.classList.remove('revealed-1');
            card.classList.add('revealed-2');
            card.querySelector('.hint').textContent = '✓';
          }
        });
        container.appendChild(card);
      });
      document.getElementById('prev').disabled = page === 0;
      document.getElementById('next').disabled = page >= totalPages - 1;
      document.getElementById('pageInfo').textContent = `${page + 1} / ${totalPages}`;
      document.getElementById('progress').textContent =
        `Sentences ${start + 1}–${Math.min(start + PER_PAGE, sentences.length)} of ${sentences.length}`;
    }

    function changePage(dir) {
      page = Math.max(0, Math.min(totalPages - 1, page + dir));
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
